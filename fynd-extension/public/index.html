<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cottonworld → Fynd Converter</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
        border: 0;
      }
      #fallback {
        display: none;
        padding: 24px;
        color: #222;
      }
      #fallback a {
        color: #1f77b4;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <iframe
      id="app"
      src="__STREAMLIT_URL__"
      title="Cottonworld to Fynd Converter"
      allow="clipboard-read; clipboard-write; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"
      onerror="document.getElementById('fallback').style.display='block'"
    ></iframe>
    <div id="fallback">
      <h2>Tool didn't load</h2>
      <p>
        Open the converter directly:
        <a href="__STREAMLIT_URL__" target="_blank" rel="noopener">open in new tab</a>.
      </p>
    </div>
  </body>
</html>
